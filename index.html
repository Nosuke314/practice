<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>練習用</title>
    <meta name="description"content="しがない少年が頑張るようです。">
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="light">
     <img id="lamp" src="無題225_20260310231135.png" alt="エラー">
    </div>
    <div id="page1" class="page">
     <p>とても暗い部屋だ。</p>
     <p>「やぁ、いらっしゃい。」</p>
     <p>そこには白くてほんのり発光する小さなオバケがいた。</p>
     <p>「ここは世界の明暗を調整する部屋なんだ。」</p>
     <p>「実は僕は、いや、僕たちは兄弟でこの部屋を管理していたんだ。」</p>
     <p>「けれど、突然相方がいなくなってしまった、、、」</p>
     <p>「ただ、彼の気配だけはずっとここに残っているんだ！」</p>
     <p>「どうか一緒に彼を探してくれないか？」</p>
    </div>
  </body>
  <script>
let state = 1;

const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const page3 = document.getElementById("page3");

page1.classList.add("show");

document.getElementById("lamp").onclick = function(){

  if(state === 1){
    page1.classList.remove("show");
    page2.classList.add("show");
    state = 2;
  }

  else if(state === 2){
    page2.classList.remove("show");
    page3.classList.add("show");
    state = 3;
  }

  else{
    page3.classList.remove("show");
    page2.classList.add("show");
    state = 2;
  }

}
</script>
</html>
